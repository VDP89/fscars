name: Bug report
description: Something is broken or not behaving as documented.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A short, clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: Minimal sequence of commands or actions to reproduce.
      render: bash
  - type: input
    id: version
    attributes:
      label: fscars version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS / Python
      placeholder: "macOS 14 / Python 3.11"
    validations:
      required: true
