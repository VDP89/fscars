name: Render launch animation

on:
  push:
    branches: [main]
    paths:
      - "scripts/render_launch_gif.py"
      - ".github/workflows/launch-gif.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow + JetBrains Mono + Inter
        run: |
          python -m pip install --upgrade pip
          pip install "Pillow>=10"
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            fonts-jetbrains-mono \
            fonts-inter

      - name: Render launch GIFs
        run: python scripts/render_launch_gif.py

      - name: Commit launch GIFs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/fscars-launch.gif assets/fscars-launch-dark.gif
          if git diff --staged --quiet; then
            echo "launch GIFs unchanged - skipping commit"
            exit 0
          fi
          git commit -m "chore(assets): regenerate launch animation from $(echo $GITHUB_SHA | cut -c1-7)"
          git push
